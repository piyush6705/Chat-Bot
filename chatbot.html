<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Bot</title>
</head>
<body>
  <div class="js-container"></div>

  
 
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  

  <script type="text/babel">
    function ChatInput() {
      return (
        <>
          <input placeholder="Type your message..." size="30" />
          <button>
            Send
          </button>
        </>
      );
    }

    function ChatMessage (props) {
      const message = props.message;
      const sender = props.sender;

      if (sender === 'bot') {
        return (
          <div>
            <img src="robot.png" width="50" />
            {message}
          </div>
        );
      } else {
        return (
          <div>
            {message}
            <img src="me.png" width="50" />
          </div>
        );
      }
    }


    const app = (
      <>
        
        <ChatInput />
        <ChatMessage message="hello chatbot" sender="user"/>
        <ChatMessage message="Hello! How can I help you?" sender="bot"/>
        <ChatMessage message="I want to know about your services." sender="user"/>
        <ChatMessage message="Sure!" sender="bot"/>
      </>
    )

    const container = document.querySelector('.js-container');

    ReactDOM.createRoot(container).render(
      app
    );

  </script>
</body>
</html>
